<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatMood AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/chatmood-logo.png" />
  <link rel="apple-touch-icon" href="/chatmood-logo.png" />
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <!-- Sidebar / Header -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <img src="/chatmood-logo.png" alt="ChatMood" width="28" height="28" style="object-fit:contain;border-radius:4px;" />
        </div>
        <span class="brand-name">ChatMood</span>
      </div>
      <div class="sidebar-info">
        <p>Powered by Gemini AI</p>
        <p>Share your mood, get support ✨</p>
      </div>
      <div class="sidebar-footer">
        <a href="https://sfalabs.tech" target="_blank" rel="noopener noreferrer">sfalabs.tech</a>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area">
      <!-- Mobile Header -->
      <header class="mobile-header">
        <div class="brand-icon small">
          <img src="/chatmood-logo.png" alt="ChatMood" width="20" height="20" style="object-fit:contain;border-radius:3px;" />
        </div>
        <span>ChatMood AI</span>
      </header>

      <!-- Messages -->
      <div id="chat-box" class="chat-box">
        <div class="welcome-message">
          <div class="welcome-icon">🌟</div>
          <h2>Halo! Aku ChatMood AI</h2>
          <p>Ceritakan perasaan atau mood kamu hari ini, aku siap mendengarkan dan membantu.</p>
        </div>
      </div>

      <!-- Input Form -->
      <div class="input-area">
        <form id="chat-form">
          <div class="input-wrapper">
            <input
              type="text"
              id="user-input"
              placeholder="Ceritakan mood kamu..."
              autocomplete="off"
              required
            />
            <button type="submit" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </form>
        <p class="input-hint">© 2025 ChatMood AI · <a href="https://sfalabs.tech" target="_blank" rel="noopener noreferrer">sfalabs.tech</a></p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
