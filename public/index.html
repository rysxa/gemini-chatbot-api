<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatMood AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <!-- Sidebar / Header -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12C2 13.85 2.5 15.58 3.37 17.07L2 22L6.93 20.63C8.42 21.5 10.15 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="white"/>
            <path d="M8 12C8 12.55 7.55 13 7 13C6.45 13 6 12.55 6 12C6 11.45 6.45 11 7 11C7.55 11 8 11.45 8 12Z" fill="#7c3aed"/>
            <path d="M13 12C13 12.55 12.55 13 12 13C11.45 13 11 12.55 11 12C11 11.45 11.45 11 12 11C12.55 11 13 11.45 13 12Z" fill="#7c3aed"/>
            <path d="M18 12C18 12.55 17.55 13 17 13C16.45 13 16 12.55 16 12C16 11.45 16.45 11 17 11C17.55 11 18 11.45 18 12Z" fill="#7c3aed"/>
          </svg>
        </div>
        <span class="brand-name">ChatMood</span>
      </div>
      <div class="sidebar-info">
        <p>Powered by Gemini AI</p>
        <p>Share your mood, get support ✨</p>
      </div>
      <div class="sidebar-footer">
        <a href="https://sfalabs.tech" target="_blank" rel="noopener noreferrer">sfalabs.tech</a>
        <a href="https://instagram.com/indrysefvi" target="_blank" rel="noopener" aria-label="Instagram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="6" fill="#E1306C"/>
            <path d="M12 7.2A4.8 4.8 0 1 0 12 16.8A4.8 4.8 0 1 0 12 7.2Z" fill="white"/>
            <circle cx="17.2" cy="6.8" r="1.2" fill="white"/>
          </svg>
          @indrysefvi
        </a>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area">
      <!-- Mobile Header -->
      <header class="mobile-header">
        <div class="brand-icon small">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12C2 13.85 2.5 15.58 3.37 17.07L2 22L6.93 20.63C8.42 21.5 10.15 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="white"/>
          </svg>
        </div>
        <span>ChatMood AI</span>
      </header>

      <!-- Messages -->
      <div id="chat-box" class="chat-box">
        <div class="welcome-message">
          <div class="welcome-icon">🌟</div>
          <h2>Halo! Aku ChatMood AI</h2>
          <p>Ceritakan perasaan atau mood kamu hari ini, aku siap mendengarkan dan membantu.</p>
        </div>
      </div>

      <!-- Input Form -->
      <div class="input-area">
        <form id="chat-form">
          <div class="input-wrapper">
            <input
              type="text"
              id="user-input"
              placeholder="Ceritakan mood kamu..."
              autocomplete="off"
              required
            />
            <button type="submit" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </form>
        <p class="input-hint">© 2025 ChatMood AI · <a href="https://sfalabs.tech" target="_blank" rel="noopener noreferrer">sfalabs.tech</a></p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
